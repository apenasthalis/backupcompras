services:
  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "80:80"
    networks:
      - internal
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    # ports:
    #   - "9003:9003"
    networks:
      - internal
    # environment:
    #   - XDEBUG_MODE=debug
    #   - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003

networks:
  internal:
    driver: bridge