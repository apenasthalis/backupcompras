services:
  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - php
    volumes:
      - .:/var/www/html
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app

  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    networks:
      app:
        aliases:
          - php

networks:
  app:
    driver: bridge
